<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Finder</title>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            indigo: {
              50:  '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              500: '#6366f1',
              600: '#4f46e5',
            }
          }
        }
      }
    }
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    body {
      background: #f9fafb;
      font-family: 'Inter', sans-serif;
      color: #111827;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .btn-primary {
      background: #6366f1;
      color: #ffffff;
      font-weight: 500;
      border-radius: 8px;
      padding: 0.625rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .form-input {
      background: #ffffff;
      border: 1px solid #d1d5db;
      color: #111827;
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
    }
    .form-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .form-input::placeholder { color: #9ca3af; }

    .tab-btn {
      padding: 0.4rem 1.1rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      font-family: 'Inter', sans-serif;
    }
    .tab-active {
      background: #eef2ff;
      border-color: #c7d2fe;
      color: #6366f1;
    }
    .tab-inactive {
      color: #6b7280;
      background: transparent;
    }
    .tab-inactive:hover {
      background: #f3f4f6;
      color: #374151;
    }

    /* HTMX spinner */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator,
    .htmx-indicator.htmx-request { display: flex; }

    .spinner-ring {
      width: 18px; height: 18px;
      border: 2px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div class="max-w-2xl mx-auto px-4 py-12" x-data="{ tab: 'restaurants' }">

    <!-- Header -->
    <div class="text-center mb-10">
      <h1 style="font-size: 1.75rem; font-weight: 600; color: #111827; letter-spacing: -0.02em;">Travel Finder</h1>
      <p style="color: #6b7280; font-size: 0.9rem; margin-top: 0.35rem;">Top-rated restaurants &amp; boutique hotels, ranked by distance</p>
    </div>

    <!-- Search card -->
    <div class="card p-6">

      <!-- Tab switcher -->
      <div class="flex gap-2 mb-5">
        <button
          class="tab-btn"
          :class="tab === 'restaurants' ? 'tab-active' : 'tab-inactive'"
          @click="tab = 'restaurants'">
          Restaurants
        </button>
        <button
          class="tab-btn"
          :class="tab === 'hotels' ? 'tab-active' : 'tab-inactive'"
          @click="tab = 'hotels'">
          Hotels
        </button>
      </div>

      <!-- Restaurant form -->
      <form
        x-show="tab === 'restaurants'"
        hx-post="/search/restaurants"
        hx-target="#results"
        hx-swap="innerHTML"
        hx-indicator="#spinner-restaurants"
        class="space-y-3">
        <div>
          <input
            type="text"
            name="query"
            class="form-input"
            placeholder='e.g. "Paris" or "Lisbon — gluten free, outdoor terrace"'
            required />
        </div>
        <div class="flex items-center gap-3 pt-1">
          <button type="submit" class="btn-primary">Search</button>
          <div id="spinner-restaurants" class="htmx-indicator items-center gap-2">
            <div class="spinner-ring"></div>
            <span style="color: #6b7280; font-size: 0.8rem;">Searching&hellip;</span>
          </div>
        </div>
      </form>

      <!-- Hotel form -->
      <form
        x-show="tab === 'hotels'"
        hx-post="/search/hotels"
        hx-target="#results"
        hx-swap="innerHTML"
        hx-indicator="#spinner-hotels"
        class="space-y-3">
        <div>
          <input
            type="text"
            name="query"
            class="form-input"
            placeholder='e.g. "Lisbon" or "Marrakech — historic, design hotel"'
            required />
        </div>
        <div class="flex items-center gap-3 pt-1">
          <button type="submit" class="btn-primary">Search</button>
          <div id="spinner-hotels" class="htmx-indicator items-center gap-2">
            <div class="spinner-ring"></div>
            <span style="color: #6b7280; font-size: 0.8rem;">Searching&hellip;</span>
          </div>
        </div>
      </form>

    </div>

    <!-- Results target -->
    <div id="results" class="mt-6"></div>

    <!-- Footer -->
    <footer class="text-center mt-14" style="color: #d1d5db; font-size: 0.72rem;">
      Powered by Google Maps &bull; AI analysis by Claude &bull; GF: Confirmed / Likely (inferred) / Unclear
    </footer>

  </div>
</body>
</html>
